<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisk & Crumb Login</title>
<style>
body {
  margin:0;
  height:100vh;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow:hidden;
  background: linear-gradient(135deg, #8b4513, #d2691e);
}
.login {
  position: relative;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.2);
  border-radius: 15px;
  padding: 40px 30px;
  text-align: center;
  color: white;
  z-index: 1;
}
.glass-bg {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 400px;
  height: 300px;
  background: url('cookies.jpg') center/cover no-repeat;
  filter: blur(8px) brightness(0.7);
  border-radius: 20px;
  transform: translate(-50%, -50%);
  animation: float 6s ease-in-out infinite alternate;
  z-index: 0;
}
@keyframes float {
  0% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg);}
  50% { transform: translate(-50%, -50%) translateY(-15px) rotate(2deg);}
  100% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg);}
}
input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}
button {
  padding: 10px;
  width: 95%;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  background: #fff;
  color: #8b4513;
  transition: 0.3s;
}
button:hover { background:#f5deb3; }
.fall {
  position: fixed;
  top:-50px;
  animation: fall linear infinite;
  font-size: 20px;
}
@keyframes fall { to { transform: translateY(100vh) rotate(360deg);}}
</style>
</head>
<body>

<div class="glass-bg"></div>

<div class="login">
  <h2>Whisk & Crumb 🔐</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button id="loginBtn">Login</button>
  <button id="logoutBtn" style="display:none; margin-top:10px;">Logout</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script>
// Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "whiskncrumbcom.firebaseapp.com",
  databaseURL: "https://whiskncrumbcom-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "whiskncrumbcom",
  storageBucket: "whiskncrumbcom.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Login function
function login() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();
  if(!u || !p){ alert("Enter username and password!"); return; }
  
  db.ref("admins/"+u).get().then(snapshot=>{
    if(snapshot.exists() && snapshot.val().password === p){
      localStorage.setItem("auth", u);
      alert("Login successful!");
      showLogout();
      window.location.href = "index.html"; // redirect to menu/admin page
    } else {
      alert("Wrong credentials!");
    }
  }).catch(err=>alert("Error: "+err.message));
}

// Logout function
function logout() {
  localStorage.removeItem("auth");
  alert("Logged out!");
  window.location.reload();
}

// Show logout if already logged in
function showLogout() {
  document.getElementById("logoutBtn").style.display = "block";
  document.getElementById("loginBtn").style.display = "none";
}

// Auto check auth
window.onload = ()=>{
  const user = localStorage.getItem("auth");
  if(user) showLogout();
}

// ENTER key support
document.getElementById("username").addEventListener("keypress", e=>{ if(e.key==="Enter") login(); });
document.getElementById("password").addEventListener("keypress", e=>{ if(e.key==="Enter") login(); });
document.getElementById("loginBtn").addEventListener("click", login);
document.getElementById("logoutBtn").addEventListener("click", logout);

// Falling cookies/snow
setInterval(()=>{
  let el = document.createElement("div");
  el.className = "fall";
  el.innerHTML = Math.random()>0.5?"❄️":"🍪";
  el.style.left = Math.random()*100+"vw";
  el.style.fontSize = (15+Math.random()*25)+"px";
  el.style.animationDuration = (4+Math.random()*5)+"s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),9000);
},400);
</script>

</body>
</html>
