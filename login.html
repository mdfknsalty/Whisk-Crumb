<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisk & Crumb Login</title>

<style>
body {
  margin:0;
  height:100vh;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow:hidden;
  background: linear-gradient(135deg, #8b4513, #d2691e);
}

/* GLASS LOGIN BOX */
.login {
  position: relative;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.2);
  border-radius: 15px;
  padding: 40px 30px;
  text-align: center;
  color: white;
  z-index: 1;
}

/* FLOATING GLASS PICTURE */
.glass-bg {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 400px;
  height: 300px;
  background: url('cookies.jpg') center/cover no-repeat;
  filter: blur(8px) brightness(0.7);
  border-radius: 20px;
  transform: translate(-50%, -50%);
  animation: float 6s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes float {
  0% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg);}
  50% { transform: translate(-50%, -50%) translateY(-15px) rotate(2deg);}
  100% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg);}
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
}

button {
  padding: 10px;
  width: 95%;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  background: #fff;
  color: #8b4513;
  transition: 0.3s;
}
button:hover { background:#f5deb3; }

/* FALLING COOKIES/SNOW */
.fall {
  position: fixed;
  top:-50px;
  animation: fall linear infinite;
  font-size: 20px;
}
@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="glass-bg"></div> <!-- animated glass picture -->

<div class="login">
  <h2>Whisk & Crumb 🔐</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button id="loginBtn">Login</button>
</div>

<script>
const USER = "jullane";
const PASS = "justforclout";

// LOGIN FUNCTION
function login() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;
  
  if(u === USER && p === PASS) {
    localStorage.setItem("auth","yes");
    window.location.href = "admin.html";
  } else {
    alert("Wrong credentials!");
  }
}

// ENTER KEY SUPPORT
document.addEventListener("keydown", function(e) {
  if(e.key === "Enter") login();
});

// BUTTON CLICK
document.getElementById("loginBtn").addEventListener("click", login);

// FALLING COOKIE/SNOW
setInterval(()=>{
  let el = document.createElement("div");
  el.className = "fall";
  el.innerHTML = Math.random() > 0.5 ? "❄️" : "🍪";
  el.style.left = Math.random()*100 + "vw";
  el.style.fontSize = (15 + Math.random()*25) + "px";
  el.style.animationDuration = (4 + Math.random()*5) + "s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),9000);
}, 400);
</script>

</body>
</html>
