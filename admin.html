<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisk & Crumb Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #fff1e6, #ffe0b3);
  overflow-x: hidden;
}

/* FALLING COOKIE/SNOW */
.fall {
  position: fixed;
  top:-50px;
  animation: fall linear infinite;
  font-size: 20px;
}
@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg);}
}

/* GLASS HEADER */
header {
  position: relative;
  background: rgba(139,69,19,0.85);
  color: white;
  text-align: center;
  padding: 20px;
  backdrop-filter: blur(10px);
  border-bottom: 2px solid #d2691e;
}

/* ORDERS */
.order {
  background: rgba(255,255,255,0.85);
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
  position: relative;
}

.order button {
  position: absolute;
  top: 10px;
  right: 10px;
  background:#d2691e;
  color:white;
  border:none;
  padding:5px 10px;
  border-radius:5px;
  cursor:pointer;
}
.order button:hover {background:#f5a261;}
</style>
</head>

<body>

<header>
  <h1>Whisk & Crumb 📦</h1>
  <button onclick="location.href='index.html'">⬅ Back to Menu</button>
  <button onclick="logout()">Logout</button>
</header>

<div id="ordersContainer"></div>

<script>
// AUTH CHECK
if(localStorage.getItem("auth") !== "yes") {
  location.href="login.html";
}

// LOAD ORDERS
let orders = JSON.parse(localStorage.getItem("orders")) || [];
const container = document.getElementById("ordersContainer");

function renderOrders() {
  container.innerHTML = "";
  orders.forEach((order, idx) => {
    const div = document.createElement("div");
    div.className = "order";

    let html = `<b>${order.name}</b><br>${order.address}<hr>`;
    order.items.forEach(i => {
      html += `${i.name} x${i.qty} - ₱${i.price*i.qty}<br>`;
    });
    html += `<b>Total: ₱${order.total}</b>`;
    div.innerHTML = html;

    // DELETE BUTTON
    const delBtn = document.createElement("button");
    delBtn.innerText = "Delete";
    delBtn.onclick = () => deleteOrder(idx);
    div.appendChild(delBtn);

    container.appendChild(div);
  });
}

function deleteOrder(idx) {
  if(confirm("Delete this order?")) {
    orders.splice(idx,1);
    localStorage.setItem("orders", JSON.stringify(orders));
    renderOrders();
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem("auth");
  location.href="login.html";
}

renderOrders();

/* FALLING COOKIE/SNOW */
setInterval(()=>{
  let el = document.createElement("div");
  el.className = "fall";
  el.innerHTML = Math.random() > 0.5 ? "❄️" : "🍪";
  el.style.left = Math.random()*100 + "vw";
  el.style.fontSize = (15 + Math.random()*25) + "px";
  el.style.animationDuration = (4 + Math.random()*5) + "s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),9000);
},400);
</script>

</body>
</html>
