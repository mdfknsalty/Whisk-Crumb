<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisk & Crumb</title>
<style>
/* ======== GENERAL STYLES ======== */
body { margin:0; font-family: Arial, sans-serif; background: linear-gradient(160deg,#fff1e6,#ffe0b3); overflow-x:hidden; }
header { background: rgba(255,255,255,0.1); color: #fff; padding:20px; backdrop-filter: blur(10px); border-bottom:2px solid #d2691e; display:flex; align-items:center; justify-content: space-between; position:sticky; top:0; z-index:100;}
header h1 { margin:0; font-size:2em; text-shadow: 1px 1px 4px #000; }
.social a { color:white; margin-left:10px; display:inline-block; animation: floatIcon 3s ease-in-out infinite alternate; transition: transform 0.3s; }
.social a:hover { transform: scale(1.4); }
.social svg { width:30px; height:30px; fill:white; filter: drop-shadow(1px 1px 2px #000); }
@keyframes floatIcon {0%{transform:translateY(0);}50%{transform:translateY(-8px);}100%{transform:translateY(0);}}

#loginPanel { display:flex; align-items:center; gap:5px;}
#loginPanel input { padding:3px 5px; border-radius:5px; border:1px solid #ccc; width:90px;}
#loginPanel button { padding:5px 8px; border-radius:5px; border:none; background:#d2691e; color:white; cursor:pointer; transition:0.3s; }
#loginPanel button:hover { background:#ff7f50; }

/* MENU CARDS */
.container { display:flex; justify-content:center; gap:20px; flex-wrap: wrap; padding:20px; }
.card { background: rgba(255,255,255,0.25); padding:15px; border-radius:15px; width:250px; text-align:center; box-shadow:0 8px 15px rgba(0,0,0,0.2); backdrop-filter: blur(8px); transition: transform 0.3s, box-shadow 0.3s; }
.card:hover { transform: scale(1.05); box-shadow:0 12px 20px rgba(0,0,0,0.3);}
img { width:100%; height:180px; object-fit:cover; border-radius:10px; }

/* CART */
.cart { background: rgba(255,255,255,0.25); margin:20px; padding:20px; border-radius:15px; box-shadow:0 8px 15px rgba(0,0,0,0.2); backdrop-filter: blur(8px); }
.cart-item { display:flex; align-items:center; gap:10px; padding:5px; border-radius:5px; margin-bottom:5px; background: rgba(255,255,255,0.3); transition: background 0.3s; }
.cart-item:hover { background: rgba(255,255,255,0.5);}
.cart-item img { width:50px; height:50px; object-fit:cover; border-radius:5px; }
.cart-item div { flex-grow:1; }
.cart-item button { padding:2px 5px; border-radius:3px; border:none; background:#d2691e; color:white; cursor:pointer; transition:0.3s; }
.cart-item button:hover { background:#ff7f50; }

/* OWNER DASHBOARD */
#ownerDashboard { margin:20px; padding:20px; border-radius:15px; background: rgba(255,255,255,0.25); box-shadow:0 8px 15px rgba(0,0,0,0.2); backdrop-filter: blur(8px); display:none; transition: all 0.5s; }
#toggleOrdersBtn { margin-bottom:10px; padding:5px 10px; border-radius:5px; border:none; background:#d2691e; color:white; cursor:pointer; transition:0.3s; }
#toggleOrdersBtn:hover { background:#ff7f50; }

/* FALLING COOKIE/SNOW */
.fall { position: fixed; top:-50px; animation: fall linear infinite; font-size:20px; z-index:0;}
@keyframes fall { to { transform: translateY(100vh) rotate(360deg);} }

</style>
</head>
<body>

<header>
  <h1>Whisk & Crumb 🍪</h1>
  <div style="display:flex;align-items:center;">
    <div class="social">
      <a href="https://web.facebook.com/profile.php?id=61584011932772" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.988h-2.54v-2.89h2.54V9.797c0-2.507 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.242 0-1.63.772-1.63 1.562v1.875h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
      </a>
      <a href="https://www.instagram.com/whis_kcrumb" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M7 2C4.243 2 2 4.243 2 7v10c0 2.757 2.243 5 5 5h10c2.757 0 5-2.243 5-5V7c0-2.757-2.243-5-5-5H7zm0 2h10c1.654 0 3 1.346 3 3v10c0 1.654-1.346 3-3 3H7c-1.654 0-3-1.346-3-3V7c0-1.654 1.346-3 3-3zm5 2a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6zm4.5-.5a1 1 0 100 2 1 1 0 000-2z"/></svg>
      </a>
    </div>

    <div id="loginPanel">
      <input type="text" id="user" placeholder="User">
      <input type="password" id="pass" placeholder="Pass">
      <button onclick="login()">Login</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="card">
    <img id="cookieImage" src="classic.jpg" alt="Cookie">
    <h3>Cookies ₱15</h3>
    <select id="flavor" onchange="changeImg()">
      <option value="classic.jpg">Classic</option>
      <option value="matcha.jpg">Matcha</option>
      <option value="red velvet.jpg">Red Velvet</option>
      <option value="chocolate.jpg">Chocolate</option>
    </select>
    <button onclick="addCookie()">Add</button>
  </div>
  <div class="card">
    <img src="cinnamon.jpg" alt="Cinnamon Roll">
    <h3>Cinnamon Roll ₱50</h3>
    <button onclick="add('Cinnamon Roll',50,'cinnamon.jpg')">Add</button>
  </div>
</div>

<div class="cart">
  <h2>Your Order 🛒</h2>
  <div id="cartItems"></div>
  <h3>Total: ₱<span id="total">0</span></h3>
  <input id="name" placeholder="Your Name"><br>
  <input id="contact" placeholder="Phone/Email" required><br>
  <input id="address" placeholder="Address"><br><br>
  <button onclick="placeOrder()">Place Order</button>
</div>

<div id="ownerDashboard">
  <button id="toggleOrdersBtn" onclick="toggleOrders()">Hide Orders</button>
  <h2>Owner Dashboard - Orders</h2>
  <div id="orders"></div>
</div>

<!-- ====== FIREBASE ====== -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "whiskncrumbcom.firebaseapp.com",
  databaseURL: "https://whiskncrumbcom-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "whiskncrumbcom",
  storageBucket: "whiskncrumbcom.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<script>
/* ===== FALLING COOKIE/SNOW ===== */
setInterval(()=>{
  let el=document.createElement("div");
  el.className="fall";
  el.innerHTML=Math.random()>0.5?"❄️":"🍪";
  el.style.left=Math.random()*100+"vw";
  el.style.fontSize=(15+Math.random()*25)+"px";
  el.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),9000);
},500);

/* ===== LOGIN ===== */
document.getElementById("user").addEventListener("keypress", e=>{ if(e.key==="Enter") login(); });
document.getElementById("pass").addEventListener("keypress", e=>{ if(e.key==="Enter") login(); });

function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;
  if(u==="jullane" && p==="justforclout"){
    alert("Owner Login Successful!");
    localStorage.setItem("admin","yes");
    document.getElementById("ownerDashboard").style.display="block";
    renderOrders();
  } else { alert("Wrong Credentials!"); }
}

// Persist admin login
if(localStorage.getItem("admin")==="yes") document.getElementById("ownerDashboard").style.display="block";

/* ===== IMAGE CHANGE ===== */
function changeImg(){ cookieImage.src = flavor.value; }

/* ===== CART LOGIC ===== */
let cart = [];
function addCookie(){ add(flavor.selectedOptions[0].text+" Cookie",15,flavor.value); }
function add(name,price,img){
  let item = cart.find(i=>i.name===name);
  if(item) item.qty++; else cart.push({name,price,qty:1,img});
  renderCart();
}
function renderCart(){
  let box = document.getElementById("cartItems"); box.innerHTML="";
  let total=0;
  cart.forEach((i,idx)=>{
    total += i.price*i.qty;
    box.innerHTML += `
      <div class="cart-item">
        <img src="${i.img}" alt="${i.name}">
        <div>${i.name} x${i.qty} - ₱${i.price*i.qty}</div>
        <button onclick="removeItem(${idx})">X</button>
      </div>`;
  });
  document.getElementById("total").innerText = total;
}
function removeItem(i){ cart.splice(i,1); renderCart(); }

/* ===== PLACE ORDER TO FIREBASE ===== */
function placeOrder(){
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  if(!name || !address || cart.length===0){ alert("Complete your order!"); return; }

  const order = {name,address,items:cart,total:cart.reduce((s,i)=>s+i.price*i.qty,0),timestamp:Date.now()};
  db.ref("orders").push(order).then(()=>{
    alert("Order placed successfully 🎉");
    cart=[]; renderCart();
  }).catch(err=>alert(err.message));
}

/* ===== OWNER DASHBOARD ===== */
function renderOrders(){
  const ordersDiv = document.getElementById("orders");
  db.ref("orders").on("value", snapshot=>{
    const data = snapshot.val();
    ordersDiv.innerHTML = "";
    if(!data) { ordersDiv.innerHTML="<p>No orders yet.</p>"; return; }
    Object.keys(data).forEach(key=>{
      const o = data[key];
      const items = o.items.map(x=>`${x.name} x${x.qty}`).join(", ");
      const p = document.createElement("p");
      p.innerHTML = `<strong>${o.name}</strong> (${o.address}) - ${items} - ₱${o.total} 
      <button onclick="deleteOrder('${key}')">Delete</button>`;
      ordersDiv.appendChild(p);
    });
  });
}
function deleteOrder(key){ db.ref("orders/"+key).remove(); }

/* TOGGLE ORDERS PANEL */
let ordersVisible = true;
function toggleOrders(){
  let dash = document.getElementById("orders");
  ordersVisible = !ordersVisible;
  dash.style.display = ordersVisible ? "block" : "none";
  document.getElementById("toggleOrdersBtn").innerText = ordersVisible ? "Hide Orders" : "Show Orders";
}

renderCart();
</script>

</body>
</html>
