<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whisk & Crumb</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(160deg, #fff1e6, #ffe0b3);
  overflow-x:hidden;
}

/* HEADER */
header {
  background: rgba(139,69,19,0.85);
  color: white;
  text-align: center;
  padding: 20px;
  backdrop-filter: blur(10px);
  border-bottom: 2px solid #d2691e;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

header h1 {
  margin:0;
  font-size: 2em;
}

/* SOCIAL ICONS */
.social a {
  color: white;
  margin-left: 10px;
  vertical-align: middle;
  display:inline-block;
  animation: floatIcon 3s ease-in-out infinite alternate;
  transition: transform 0.3s;
}
.social a:hover { transform: scale(1.3); }

.social svg {
  width:30px;
  height:30px;
  fill:white;
  filter: drop-shadow(1px 1px 2px #000);
}

@keyframes floatIcon {
  0% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0); }
}

/* CONTAINER & CARDS */
.container {
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap: wrap;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.85);
  padding:15px;
  border-radius:15px;
  width:250px;
  text-align:center;
  box-shadow:0 8px 15px rgba(0,0,0,0.2);
}

img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

button {
  background:#d2691e;
  color:white;
  border:none;
  padding:8px;
  margin-top:5px;
  cursor:pointer;
  border-radius:5px;
}

/* CART */
.cart {
  background: rgba(255,255,255,0.85);
  margin:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 15px rgba(0,0,0,0.2);
}

/* FALLING COOKIE/SNOW */
.fall {
  position: fixed;
  top:-50px;
  animation: fall linear infinite;
  font-size:20px;
}
@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg);}
}
</style>
</head>
<body>

<header>
  <h1>Whisk & Crumb 🍪</h1>
  <div class="social">
    <a href="https://web.facebook.com/profile.php?id=61584011932772" target="_blank">
      <!-- Facebook SVG -->
      <svg viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.988h-2.54v-2.89h2.54V9.797c0-2.507 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.242 0-1.63.772-1.63 1.562v1.875h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
    </a>
    <a href="https://www.instagram.com/whis_kcrumb" target="_blank">
      <!-- Instagram SVG -->
      <svg viewBox="0 0 24 24"><path d="M7 2C4.243 2 2 4.243 2 7v10c0 2.757 2.243 5 5 5h10c2.757 0 5-2.243 5-5V7c0-2.757-2.243-5-5-5H7zm0 2h10c1.654 0 3 1.346 3 3v10c0 1.654-1.346 3-3 3H7c-1.654 0-3-1.346-3-3V7c0-1.654 1.346-3 3-3zm5 2a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6zm4.5-.5a1 1 0 100 2 1 1 0 000-2z"/></svg>
    </a>
  </div>
</header>

<div class="container">
  <div class="card">
    <img id="cookieImage" src="classic.jpg" alt="Cookie">
    <h3>Cookies ₱15</h3>
    <select id="flavor" onchange="changeImg()">
      <option value="classic.jpg">Classic</option>
      <option value="matcha.jpg">Matcha</option>
      <option value="red velvet.jpg">Red Velvet</option>
      <option value="chocolate.jpg">Chocolate</option>
    </select>
    <button onclick="addCookie()">Add</button>
  </div>
  <div class="card">
    <img src="cinnamon.jpg" alt="Cinnamon Roll">
    <h3>Cinnamon Roll ₱50</h3>
    <button onclick="add('Cinnamon Roll',50)">Add</button>
  </div>
</div>

<div class="cart">
  <h2>Your Order 🛒</h2>
  <div id="cartItems"></div>
  <h3>Total: ₱<span id="total">0</span></h3>
  <input id="name" placeholder="Your Name"><br>
  <input id="address" placeholder="Address"><br><br>
  <button onclick="placeOrder()">Place Order</button>
</div>

<script>
/* FALLING COOKIE/SNOW */
setInterval(()=>{
  let el=document.createElement("div");
  el.className="fall";
  el.innerHTML=Math.random()>0.5?"❄️":"🍪";
  el.style.left=Math.random()*100+"vw";
  el.style.fontSize=(15+Math.random()*25)+"px";
  el.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),9000);
},500);

/* IMAGE */
function changeImg(){ cookieImage.src = flavor.value; }

/* CART LOGIC */
let cart = JSON.parse(localStorage.getItem("cart"))||[];
function addCookie(){ add(flavor.selectedOptions[0].text+" Cookie",15); }
function add(name,price){
  let item = cart.find(i=>i.name===name);
  if(item) item.qty++; else cart.push({name,price,qty:1});
  saveCart(); renderCart();
}
function renderCart(){
  let box = document.getElementById("cartItems"); box.innerHTML="";
  let total=0;
  cart.forEach((i,idx)=>{
    total += i.price*i.qty;
    box.innerHTML += `${i.name} x${i.qty} - ₱${i.price*i.qty} <button onclick="removeItem(${idx})">X</button><br>`;
  });
  document.getElementById("total").innerText = total;
}
function removeItem(i){ cart.splice(i,1); saveCart(); renderCart(); }
function saveCart(){ localStorage.setItem("cart",JSON.stringify(cart)); }

/* ORDER LIMIT & PLACE ORDER */
function canOrder(){
  let now=Date.now();
  let data = JSON.parse(localStorage.getItem("orderLimit"))||{count:0,time:now};
  if(now-data.time>15*60*1000) data={count:0,time:now};
  if(data.count>=3){ alert("Order limit reached! Try again later."); return false;}
  data.count++; localStorage.setItem("orderLimit",JSON.stringify(data)); return true;
}
function placeOrder(){
  let name=document.getElementById("name").value;
  let address=document.getElementById("address").value;
  if(!name||!address||cart.length===0){ alert("Complete your order!"); return;}
  if(!canOrder()) return;
  let total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  let orders = JSON.parse(localStorage.getItem("orders"))||[];
  orders.push({name,address,items:cart,total,date:new Date().toLocaleString()});
  localStorage.setItem("orders",JSON.stringify(orders));
  cart=[]; saveCart(); renderCart();
  alert("Order placed successfully 🎉");
}
renderCart();
</script>

</body>
</html>
